spring.application.name=leaderboard-service
server.port=8085

# H2 Database - file based so leaderboard survives restarts
spring.datasource.url=jdbc:h2:file:./data/leaderboarddb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Console to view DB at http://localhost:8085/h2-console
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update

# Enable logging for debugging
logging.level.root=INFO
logging.level.com.code2cash.leaderboard=DEBUG

# Auction Service Integration
auction.service.url=http://localhost:8082

# Leaderboard Configuration
leaderboard.top-entries=10
leaderboard.week-reset-day=MONDAY
leaderboard.week-reset-hour=0
