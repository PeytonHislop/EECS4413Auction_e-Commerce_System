# Auction Service Configuration
spring.application.name=auction-service
server.port=8082

# Database Configuration - SQLite
spring.datasource.url=jdbc:sqlite:auction-service.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# Disable automatic schema management
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Logging
logging.level.root=INFO
logging.level.com.code2cash.auction=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# External Service URLs (configured for other team members' services)
# IAM Service - Port 8081
service.iam.url=http://localhost:8081
# Catalogue Service - Port 8083
service.catalogue.url=http://localhost:8083
# Payment Service - Port 8084
service.payment.url=http://localhost:8084
# Leaderboard Service - Port 8085
service.leaderboard.url=http://localhost:8085

# Service Integration Settings
# Set to false when IAM service is running, true for standalone testing
service.iam.mock=true

# Auction Configuration
auction.scheduler.enabled=true
auction.scheduler.check-interval-seconds=60
