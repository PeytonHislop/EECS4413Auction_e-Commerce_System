server {
    listen 80;

    # Serve the React app - any route that doesn't match a file falls back to index.html
    # This is what makes React Router work correctly inside Docker
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/* requests to the gateway service
    # "gateway-service" is the Docker Compose service name - Docker's DNS resolves it automatically
    location /api {
        proxy_pass http://gateway-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Required for WebSocket connections (bid updates)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Proxy /leaderboard-api/* to the leaderboard service directly (not through gateway)
    # Strip the /leaderboard-api prefix before forwarding
    location /leaderboard-api/ {
        proxy_pass http://leaderboard-service:8085/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
