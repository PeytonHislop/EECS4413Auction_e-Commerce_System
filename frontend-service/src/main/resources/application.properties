spring.application.name=frontend-service

# Server Configuration
server.port=8086
server.servlet.context-path=/

# Static Resources Configuration
# Location of React build files (from: frontend-react/build/)
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0

# Cache busting for CSS/JS files (development)
spring.web.resources.chain.cache=false
spring.web.resources.chain.gzip=true
spring.web.resources.chain.html-minification=true

# API Gateway Configuration
# These URLs are accessible to frontend code
api.gateway.url=http://localhost:8080
api.leaderboard.url=http://localhost:8085

# Logging Configuration
logging.level.root=INFO
logging.level.com.code2cash.frontend=DEBUG
logging.level.org.springframework.web=DEBUG

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always

# React SPA Configuration
# Ensures all routes that don't match static resources are handled by React Router
spring.mvc.throw-exception-if-no-handler-found=false
spring.web.resources.add-mappings=true
