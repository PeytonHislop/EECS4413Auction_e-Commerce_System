<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code2Cash Payment Checkout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5efe6;
            --bg-panel: rgba(255, 252, 246, 0.82);
            --text: #1f2933;
            --muted: #52606d;
            --line: rgba(31, 41, 51, 0.12);
            --accent: #c84b31;
            --accent-dark: #8f2d1f;
            --accent-soft: rgba(200, 75, 49, 0.14);
            --success: #1f7a4d;
            --danger: #9f1239;
            --shadow: 0 24px 80px rgba(92, 63, 45, 0.16);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Space Grotesk", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(200, 75, 49, 0.22), transparent 32%),
                radial-gradient(circle at bottom right, rgba(68, 111, 88, 0.18), transparent 28%),
                linear-gradient(145deg, #f8f1e7 0%, #efe6d8 52%, #e7dbc9 100%);
        }

        .shell {
            width: min(1160px, calc(100% - 32px));
            margin: 32px auto;
            padding: 28px;
            border: 1px solid var(--line);
            border-radius: 28px;
            background: var(--bg-panel);
            backdrop-filter: blur(18px);
            box-shadow: var(--shadow);
        }

        .hero {
            display: grid;
            grid-template-columns: 1.25fr 0.95fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .hero-panel,
        .card {
            border: 1px solid var(--line);
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.72);
            padding: 24px;
        }

        .eyebrow,
        .pill,
        .code {
            font-family: "IBM Plex Mono", monospace;
        }

        .eyebrow {
            display: inline-block;
            padding: 7px 10px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent-dark);
            font-size: 12px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        h1, h2, h3, p {
            margin: 0;
        }

        h1 {
            font-size: clamp(2.5rem, 5vw, 4.75rem);
            line-height: 0.95;
            margin-top: 18px;
            margin-bottom: 16px;
            letter-spacing: -0.05em;
        }

        .hero-copy {
            max-width: 680px;
            color: var(--muted);
            font-size: 1.02rem;
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
        }

        .mini-stat {
            padding: 14px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid var(--line);
        }

        .mini-stat strong {
            display: block;
            font-size: 1.3rem;
            margin-bottom: 6px;
        }

        .mini-stat span {
            color: var(--muted);
            font-size: 0.92rem;
        }

        .stack {
            display: grid;
            gap: 18px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 24px;
        }

        .section-heading {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 18px;
        }

        .section-heading p {
            color: var(--muted);
            max-width: 560px;
            line-height: 1.6;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .field {
            display: grid;
            gap: 8px;
        }

        .field.full {
            grid-column: 1 / -1;
        }

        label {
            font-size: 0.92rem;
            font-weight: 700;
        }

        input, textarea {
            width: 100%;
            border: 1px solid rgba(31, 41, 51, 0.15);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.92);
            padding: 14px 15px;
            font: inherit;
            color: var(--text);
            transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
        }

        textarea {
            resize: vertical;
            min-height: 112px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: rgba(200, 75, 49, 0.55);
            box-shadow: 0 0 0 4px rgba(200, 75, 49, 0.12);
            transform: translateY(-1px);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            appearance: none;
            border: none;
            border-radius: 999px;
            padding: 14px 20px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.18s ease, opacity 0.18s ease, box-shadow 0.18s ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.64;
            cursor: progress;
            transform: none;
        }

        .primary {
            background: linear-gradient(135deg, #d65a3f 0%, #b53f2f 100%);
            color: #fff;
            box-shadow: 0 14px 34px rgba(200, 75, 49, 0.28);
        }

        .secondary {
            background: rgba(31, 41, 51, 0.08);
            color: var(--text);
        }

        .status-box,
        .receipt-box,
        .hint-box,
        .preview-box {
            border-radius: 20px;
            padding: 18px;
            border: 1px solid var(--line);
        }

        .hint-box {
            background: rgba(255, 248, 235, 0.8);
        }

        .status-box.success,
        .receipt-box {
            background: rgba(230, 247, 236, 0.88);
            border-color: rgba(31, 122, 77, 0.22);
        }

        .status-box.error {
            background: rgba(255, 237, 241, 0.9);
            border-color: rgba(159, 18, 57, 0.18);
        }

        .status-box.loading {
            background: rgba(255, 248, 235, 0.88);
            border-color: rgba(143, 45, 31, 0.18);
        }

        .status-title,
        .receipt-title {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .status-copy,
        .receipt-row span:last-child,
        .hint-box p {
            color: var(--muted);
            line-height: 1.6;
        }

        .receipt-grid {
            display: grid;
            gap: 10px;
            margin-top: 12px;
        }

        .receipt-row {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            padding-bottom: 10px;
            border-bottom: 1px dashed rgba(31, 41, 51, 0.12);
        }

        .receipt-row.total {
            font-weight: 700;
            font-size: 1.08rem;
            color: var(--success);
        }

        .preview-box {
            background: rgba(30, 41, 59, 0.94);
            color: #e2e8f0;
            overflow: auto;
        }

        pre {
            margin: 0;
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.86rem;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 18px;
            padding: 10px 12px;
            border-radius: 999px;
            background: rgba(31, 41, 51, 0.06);
            color: var(--muted);
            font-size: 12px;
        }

        .legend {
            display: grid;
            gap: 10px;
        }

        .legend-item {
            padding: 12px 14px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--line);
        }

        .legend-item strong {
            display: block;
            margin-bottom: 4px;
        }

        .legend-item span {
            color: var(--muted);
            font-size: 0.92rem;
            line-height: 1.5;
        }

        @media (max-width: 980px) {
            .hero,
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 720px) {
            .shell {
                width: min(100% - 20px, 1160px);
                margin: 10px auto;
                padding: 14px;
                border-radius: 20px;
            }

            .hero-panel,
            .card {
                padding: 18px;
                border-radius: 18px;
            }

            .form-grid,
            .hero-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2.7rem;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
        const { useEffect, useState } = React;

        const DEFAULT_FORM = {
            gatewayUrl: localStorage.getItem("payment_gateway_url") || "http://localhost:8080/api/payments/process",
            token: localStorage.getItem("payment_jwt") || "",
            auctionId: "",
            cardNumber: "4111111111111111",
            nameOnCard: "",
            expiry: "12/27",
            cvv: "123"
        };

        function App() {
            const [form, setForm] = useState(DEFAULT_FORM);
            const [status, setStatus] = useState({ type: "idle", title: "", message: "" });
            const [receipt, setReceipt] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);

            useEffect(() => {
                localStorage.setItem("payment_gateway_url", form.gatewayUrl);
            }, [form.gatewayUrl]);

            useEffect(() => {
                localStorage.setItem("payment_jwt", form.token);
            }, [form.token]);

            function updateField(event) {
                const { name, value } = event.target;
                setForm((current) => ({ ...current, [name]: value }));
            }

            function loadDemoValues() {
                setForm((current) => ({
                    ...current,
                    auctionId: current.auctionId || "AUC001",
                    nameOnCard: current.nameOnCard || "Taylor Buyer",
                    cardNumber: "4111111111111111",
                    expiry: "12/27",
                    cvv: "123"
                }));
                setStatus({
                    type: "loading",
                    title: "Demo values loaded",
                    message: "Paste a BUYER JWT, keep the Visa-style test card, and submit through the gateway."
                });
            }

            async function submitPayment(event) {
                event.preventDefault();
                setIsSubmitting(true);
                setReceipt(null);
                setStatus({
                    type: "loading",
                    title: "Processing payment",
                    message: "The request is being sent to the gateway, which validates the user, auction winner, item shipping, and payment details."
                });

                try {
                    const response = await fetch(form.gatewayUrl, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${form.token.trim()}`
                        },
                        body: JSON.stringify({
                            auctionId: form.auctionId.trim(),
                            cardNumber: form.cardNumber.trim(),
                            nameOnCard: form.nameOnCard.trim(),
                            expiry: form.expiry.trim(),
                            cvv: form.cvv.trim()
                        })
                    });

                    const raw = await response.text();
                    const data = raw ? JSON.parse(raw) : null;

                    if (!response.ok) {
                        const message = data?.message || data?.error || "Payment request failed.";
                        throw new Error(message);
                    }

                    setReceipt(data);
                    setStatus({
                        type: "success",
                        title: "Payment completed",
                        message: "The backend returned a receipt with totals, shipping details, and the generated order ID."
                    });
                } catch (error) {
                    setStatus({
                        type: "error",
                        title: "Payment failed",
                        message: error.message || "Unexpected error while calling the payment gateway."
                    });
                } finally {
                    setIsSubmitting(false);
                }
            }

            const payloadPreview = JSON.stringify({
                auctionId: form.auctionId,
                cardNumber: form.cardNumber,
                nameOnCard: form.nameOnCard,
                expiry: form.expiry,
                cvv: form.cvv
            }, null, 2);

            return (
                <div className="shell">
                    <section className="hero">
                        <div className="hero-panel">
                            <span className="eyebrow">React Frontend For Payment Service</span>
                            <h1>Checkout Page For The Auction Winner.</h1>
                            <p className="hero-copy">
                                This page is served by the payment service on port 8084 and posts to the gateway on port 8080.
                                The gateway verifies the JWT, confirms the user is the auction winner, loads the shipping address,
                                and then forwards the payment request downstream.
                            </p>
                            <div className="hero-grid">
                                <div className="mini-stat">
                                    <strong>/</strong>
                                    <span>Open the page at the payment service root.</span>
                                </div>
                                <div className="mini-stat">
                                    <strong>/api/payments/process</strong>
                                    <span>Gateway endpoint used by the browser form.</span>
                                </div>
                                <div className="mini-stat">
                                    <strong>4***************</strong>
                                    <span>Cards starting with 4 succeed in the current backend.</span>
                                </div>
                            </div>
                            <div className="pill">Built without a Node toolchain: plain JavaScript, React UMD, and a static Spring Boot page.</div>
                        </div>

                        <div className="card stack">
                            <div className="hint-box">
                                <h3>How this flow works</h3>
                                <p>
                                    Use a BUYER JWT from the IAM service. The auction must already be closed with a winner,
                                    and the signed-in user must match that winner. Shipping cost and address are resolved by the backend.
                                </p>
                            </div>
                            <div className="legend">
                                <div className="legend-item">
                                    <strong>1. Login elsewhere</strong>
                                    <span>Get a JWT from the IAM or gateway auth endpoint and paste it here.</span>
                                </div>
                                <div className="legend-item">
                                    <strong>2. Enter auction ID</strong>
                                    <span>Example: <span className="code">AUC001</span>, if that auction exists and has a winner.</span>
                                </div>
                                <div className="legend-item">
                                    <strong>3. Submit checkout</strong>
                                    <span>The receipt comes back directly from the payment flow.</span>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section className="main-grid">
                        <div className="card">
                            <div className="section-heading">
                                <div>
                                    <h2>Payment Form</h2>
                                    <p>Everything here maps directly to the existing payment request contract and gateway route.</p>
                                </div>
                            </div>

                            <form onSubmit={submitPayment}>
                                <div className="form-grid">
                                    <div className="field full">
                                        <label htmlFor="gatewayUrl">Gateway URL</label>
                                        <input id="gatewayUrl" name="gatewayUrl" value={form.gatewayUrl} onChange={updateField} placeholder="http://localhost:8080/api/payments/process" />
                                    </div>

                                    <div className="field full">
                                        <label htmlFor="token">JWT Token</label>
                                        <textarea id="token" name="token" value={form.token} onChange={updateField} placeholder="Paste a BUYER JWT token from the IAM service or gateway login." required />
                                    </div>

                                    <div className="field">
                                        <label htmlFor="auctionId">Auction ID</label>
                                        <input id="auctionId" name="auctionId" value={form.auctionId} onChange={updateField} placeholder="AUC001" required />
                                    </div>

                                    <div className="field">
                                        <label htmlFor="nameOnCard">Name On Card</label>
                                        <input id="nameOnCard" name="nameOnCard" value={form.nameOnCard} onChange={updateField} placeholder="Taylor Buyer" required />
                                    </div>

                                    <div className="field full">
                                        <label htmlFor="cardNumber">Card Number</label>
                                        <input id="cardNumber" name="cardNumber" value={form.cardNumber} onChange={updateField} placeholder="4111111111111111" pattern="\d{16}" required />
                                    </div>

                                    <div className="field">
                                        <label htmlFor="expiry">Expiry (MM/YY)</label>
                                        <input id="expiry" name="expiry" value={form.expiry} onChange={updateField} placeholder="12/27" pattern="^(0[1-9]|1[0-2])\/\d{2}$" required />
                                    </div>

                                    <div className="field">
                                        <label htmlFor="cvv">CVV</label>
                                        <input id="cvv" name="cvv" value={form.cvv} onChange={updateField} placeholder="123" pattern="\d{3}" required />
                                    </div>
                                </div>

                                <div className="actions">
                                    <button className="primary" type="submit" disabled={isSubmitting}>
                                        {isSubmitting ? "Processing..." : "Process Payment"}
                                    </button>
                                    <button className="secondary" type="button" onClick={loadDemoValues} disabled={isSubmitting}>
                                        Load Demo Values
                                    </button>
                                </div>
                            </form>

                            {status.type !== "idle" && (
                                <div className={`status-box ${status.type}`} style={{ marginTop: "18px" }}>
                                    <div className="status-title">{status.title}</div>
                                    <div className="status-copy">{status.message}</div>
                                </div>
                            )}
                        </div>

                        <div className="stack">
                            <div className="card">
                                <div className="section-heading">
                                    <div>
                                        <h2>Request Preview</h2>
                                        <p>This is the JSON payload sent from the browser to the gateway.</p>
                                    </div>
                                </div>
                                <div className="preview-box">
                                    <pre>{payloadPreview}</pre>
                                </div>
                            </div>

                            {receipt && (
                                <div className="receipt-box">
                                    <div className="receipt-title">Receipt</div>
                                    <div className="receipt-grid">
                                        <div className="receipt-row"><span>Order ID</span><span>{receipt.orderId}</span></div>
                                        <div className="receipt-row"><span>Item Price</span><span>${Number(receipt.itemPrice || 0).toFixed(2)}</span></div>
                                        <div className="receipt-row"><span>Shipping Cost</span><span>${Number(receipt.shippingCost || 0).toFixed(2)}</span></div>
                                        <div className="receipt-row"><span>Shipping Address</span><span>{receipt.shippingAddress || "Not returned"}</span></div>
                                        <div className="receipt-row"><span>Estimated Shipping</span><span>{receipt.shippingDays} day(s)</span></div>
                                        <div className="receipt-row total"><span>Total</span><span>${Number(receipt.total || 0).toFixed(2)}</span></div>
                                    </div>
                                </div>
                            )}

                            <div className="hint-box">
                                <h3>Current backend rules</h3>
                                <p>
                                    The existing payment service marks a payment as successful when the card number starts with
                                    <span className="code"> 4 </span>
                                    and all payment fields are present. This page is meant as a lightweight developer checkout UI.
                                </p>
                            </div>
                        </div>
                    </section>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
