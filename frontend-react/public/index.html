<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#9333ea" />
    <meta
      name="description"
      content="EECS4413 - Auction e-Commerce Platform. Buy and sell items in real-time auctions."
    />
    <title>Auction Platform - EECS4413</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        width: 100%;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto",
          "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans",
          "Helvetica Neue", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #root {
        height: 100%;
        width: 100%;
      }

      /* Minimal loading screen */
      .root-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        color: #f1f5f9;
        font-family: inherit;
      }

      .loading-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }

      .loading-spinner {
        width: 3rem;
        height: 3rem;
        border: 3px solid #475569;
        border-top-color: #9333ea;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loading-text {
        font-size: 1rem;
        color: #a0aec0;
      }

      .app-title {
        font-size: 2rem;
        font-weight: 700;
        background: linear-gradient(135deg, #9333ea 0%, #c084fc 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 2rem;
      }
    </style>
  </head>
  <body>
    <!-- Loading screen shown while React app loads -->
    <div id="root">
      <div class="root-loading">
        <div class="loading-container">
          <h1 class="app-title">Auction Platform</h1>
          <div class="loading-spinner"></div>
          <p class="loading-text">Loading application...</p>
        </div>
      </div>
    </div>

    <!-- React DOM root renders here -->
    <!-- Do not modify this line -->
  </body>
</html>
