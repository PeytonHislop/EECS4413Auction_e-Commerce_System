# Catalogue Service - Port 8083
server.port=8083
service.catalogue.url=http://localhost:8083

# H2 Database Config (In-memory for testing)
spring.datasource.url=jdbc:h2:mem:cataloguedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Console to view DB at http://localhost:8083/h2-console
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update

# Defer data.sql to run after JPA creates the schema
spring.jpa.defer-datasource-initialization=true

# IAM Service URL (Update this to match your IAM service location)
iam.service.url=http://localhost:8081
